# Minnie — Arduino UNO Q #2 (Base + Camera, no arm)

robot_name: "minnie"

hardware:
  base: "ugv02"
  base_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200
    wheel_separation: 0.172
    wheel_radius: 0.04
    max_speed: 0.5
  arm: "none"
  camera: "obsbot"

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
