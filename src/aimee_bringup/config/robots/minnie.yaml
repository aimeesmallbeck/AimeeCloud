# Minnie — Arduino UNO Q #2 (Base + Camera, no arm)

robot_name: "minnie"

hardware:
  base: "wave_rover"
  base_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200
    wheel_separation: 0.172
    wheel_radius: 0.04
    max_speed: 0.5
  arm: "none"
  camera: "obsbot"
  lidar: "ld19"
  lidar_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 230400
    frame_id: "base_laser"
    height: 0.18

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
