# Ron — Arduino UNO Q #1 (Full robot: UGV02 base + RoArm-M3 + OBSBOT)

robot_name: "ron"

hardware:
  base: "ugv02"
  base_params:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    wheel_separation: 0.23
    wheel_radius: 0.04
    max_speed: 0.5
  arm: "roarm_m3"
  camera: "obsbot"

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
