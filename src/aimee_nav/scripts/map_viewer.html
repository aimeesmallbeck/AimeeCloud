<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AimeeNav Map Viewer</title>
<style>
  body { margin: 0; background: #111; color: #0f0; font-family: monospace; overflow: hidden; }
  #status { position: fixed; top: 0; left: 0; padding: 8px 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; font-size: 12px; z-index: 10; }
  #canvas { display: block; cursor: grab; }
  #canvas:active { cursor: grabbing; }
  #controls { position: fixed; bottom: 10px; left: 10px; z-index: 10; display: flex; gap: 6px; align-items: center; }
  button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 13px; }
  button:hover { background: #0f0; color: #000; }
  button.active { background: #0f0; color: #000; }
  #info { margin-left: 10px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div id="status">Connecting...</div>
<canvas id="canvas"></canvas>
<div id="controls">
  <button onclick="fitToScreen()">Fit</button>
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>
  <button id="followBtn" onclick="toggleFollow()">Follow</button>
  <span id="info"></span>
</div>

<script>
// --- Configuration ---
const WS_URL = 'ws://' + (location.hostname || '192.168.1.56') + ':9090';
const MAP_TOPIC = '/map';
const ODOM_TOPIC = '/odom';

// --- State ---
let ws = null;
let mapData = null;
let robotPose = null;
let scale = 1;           // pixels per meter
let viewX = 0, viewY = 0; // world coords at center of canvas
let followRobot = true;
let isDragging = false;
let lastMX = 0, lastMY = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const infoEl = document.getElementById('info');
const followBtn = document.getElementById('followBtn');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (mapData) render();
}
window.addEventListener('resize', resize);
resize();

// --- WebSocket ---
function connect() {
  statusEl.textContent = 'Connecting to ' + WS_URL + '...';
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusEl.textContent = 'Connected. Subscribing...';
    ws.send(JSON.stringify({
      op: 'subscribe',
      topic: MAP_TOPIC,
      type: 'nav_msgs/OccupancyGrid',
      throttle_rate: 500
    }));
    ws.send(JSON.stringify({
      op: 'subscribe',
      topic: ODOM_TOPIC,
      type: 'nav_msgs/Odometry',
      throttle_rate: 200
    }));
    statusEl.textContent = 'Connected. Waiting for map...';
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.topic === MAP_TOPIC) {
      mapData = msg.msg;
      statusEl.textContent = 'Map: ' + mapData.info.width + '×' + mapData.info.height +
        ' @ ' + mapData.info.resolution.toFixed(3) + ' m/cell';
      fitToScreen();
    } else if (msg.topic === ODOM_TOPIC) {
      robotPose = msg.msg.pose.pose;
      if (mapData) render();
    }
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected. Retrying in 3s...';
    setTimeout(connect, 3000);
  };

  ws.onerror = (err) => {
    statusEl.textContent = 'WebSocket error. Retrying in 3s...';
    ws.close();
  };
}

// --- Rendering ---
function render() {
  if (!mapData) return;
  const info = mapData.info;
  const w = info.width;
  const h = info.height;
  const data = mapData.data;
  const res = info.resolution;

  // Determine view center
  let cx = viewX;
  let cy = viewY;
  if (followRobot && robotPose) {
    cx = robotPose.position.x;
    cy = robotPose.position.y;
  }

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cellPx = scale * res;
  // Optimization: only draw visible cells
  const halfW = canvas.width / 2;
  const halfH = canvas.height / 2;
  const minWorldX = cx - halfW / scale;
  const maxWorldX = cx + halfW / scale;
  const minWorldY = cy - halfH / scale;
  const maxWorldY = cy + halfH / scale;

  const minCol = Math.max(0, Math.floor((minWorldX - info.origin.position.x) / res));
  const maxCol = Math.min(w - 1, Math.ceil((maxWorldX - info.origin.position.x) / res));
  const minRow = Math.max(0, Math.floor((minWorldY - info.origin.position.y) / res));
  const maxRow = Math.min(h - 1, Math.ceil((maxWorldY - info.origin.position.y) / res));

  for (let row = minRow; row <= maxRow; row++) {
    for (let col = minCol; col <= maxCol; col++) {
      const v = data[row * w + col];
      if (v < 0) continue; // unknown: background

      const wx = info.origin.position.x + (col + 0.5) * res;
      const wy = info.origin.position.y + (row + 0.5) * res;
      const sx = halfW + (wx - cx) * scale;
      const sy = halfH - (wy - cy) * scale; // flip Y

      if (v > 50) ctx.fillStyle = '#dc3c3c'; // occupied
      else ctx.fillStyle = '#287828';         // free
      ctx.fillRect(sx - cellPx / 2, sy - cellPx / 2, cellPx + 0.5, cellPx + 0.5);
    }
  }

  // Draw robot
  if (robotPose) {
    const sx = halfW + (robotPose.position.x - cx) * scale;
    const sy = halfH - (robotPose.position.y - cy) * scale;
    const q = robotPose.orientation;
    const yaw = Math.atan2(2.0 * (q.w * q.z), 1.0 - 2.0 * (q.z * q.z));
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(-yaw); // canvas rotation is clockwise
    ctx.fillStyle = '#0f0';
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-6, 5);
    ctx.lineTo(-6, -5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  infoEl.textContent = 'Scale: ' + scale.toFixed(2) + ' px/m | Center: (' + cx.toFixed(2) + ', ' + cy.toFixed(2) + ')';
}

// --- Controls ---
function fitToScreen() {
  if (!mapData) return;
  const info = mapData.info;
  scale = Math.min(canvas.width / (info.width * info.resolution),
                   canvas.height / (info.height * info.resolution)) * 0.9;
  if (robotPose) {
    viewX = robotPose.position.x;
    viewY = robotPose.position.y;
  } else {
    viewX = info.origin.position.x + info.width * info.resolution / 2;
    viewY = info.origin.position.y + info.height * info.resolution / 2;
  }
  followRobot = true;
  updateFollowButton();
  render();
}

function zoomIn() { scale *= 1.3; render(); }
function zoomOut() { scale /= 1.3; render(); }

function toggleFollow() {
  followRobot = !followRobot;
  updateFollowButton();
  if (followRobot && robotPose) {
    viewX = robotPose.position.x;
    viewY = robotPose.position.y;
    render();
  }
}

function updateFollowButton() {
  followBtn.classList.toggle('active', followRobot);
}

// --- Pan ---
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  lastMX = e.clientX;
  lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMX;
  const dy = e.clientY - lastMY;
  viewX -= dx / scale;
  viewY += dy / scale; // Y is flipped
  lastMX = e.clientX;
  lastMY = e.clientY;
  if (followRobot) {
    followRobot = false;
    updateFollowButton();
  }
  render();
});

// --- Wheel zoom ---
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  scale *= factor;
  render();
}, { passive: false });

connect();
</script>
</body>
</html>
