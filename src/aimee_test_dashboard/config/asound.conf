# ALSA Configuration for Arduino Imola HPH Speaker
# Place this file at /etc/asound.conf on the host system
# or mount into Docker container

pcm.!default {
    type asym
    playback.pcm "speaker"
    capture.pcm "mic"
}

# Arduino Imola HPH Speaker (hw:0,3)
pcm.speaker {
    type hw
    card 0
    device 3
}

# RC08 USB Microphone (hw:1,0)
pcm.mic {
    type hw
    card 1
    device 0
}

# Control interface
ctl.!default {
    type hw
    card 0
}
