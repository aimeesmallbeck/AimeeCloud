<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMEE ROS2 Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #0f3460;
            --accent: #e94560;
            --accent-green: #00d9ff;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --debug: #6c757d;
            --info: #0dcaf0;
            --warn: #ffc107;
            --error: #dc3545;
            --fatal: #6f42c1;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        header h1::before { content: "🔍"; }
        
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--debug); animation: pulse 2s infinite; }
        .status-dot.connected { background: #28a745; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }
        
        @media (max-width: 1100px) {
            main { grid-template-columns: 1fr; grid-template-rows: auto auto; }
        }
        
        .panel {
            background: var(--bg-panel);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            background: var(--bg-card);
            padding: 0.75rem 1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        /* Core Controls */
        .core-controls { display: flex; gap: 0.5rem; padding: 0.5rem; }
        .core-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.75rem; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .core-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .core-btn:active { transform: translateY(0); }
        .core-start { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
        .core-stop { background: linear-gradient(135deg, #dc3545, #fd7e14); color: white; }
        .core-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .core-message { text-align: center; font-size: 0.8rem; padding: 0.5rem; min-height: 1.5rem; }
        
        /* Node Launcher */
        .launcher-grid { display: grid; grid-template-columns: 1fr; gap: 0.4rem; }
        .launcher-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.5rem; background: var(--bg-panel); border-radius: 6px;
            border-left: 3px solid var(--text-muted); transition: all 0.2s;
        }
        .launcher-item:hover { background: var(--bg-card); }
        .launcher-item.running { border-left-color: #28a745; background: rgba(40, 167, 69, 0.1); }
        .launcher-item.category-audio { border-left-color: #fd7e14; }
        .launcher-item.category-ai { border-left-color: #0dcaf0; }
        .launcher-item.category-skills { border-left-color: #20c997; }
        .launcher-item.category-vision { border-left-color: #e83e8c; }
        .launcher-item.category-tools { border-left-color: #6c757d; }
        
        .launcher-info { display: flex; align-items: center; gap: 0.5rem; }
        .launcher-icon { font-size: 1.2rem; }
        .launcher-name { font-size: 0.85rem; font-weight: 500; }
        .launcher-category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        
        .launcher-btn {
            padding: 0.3rem 0.6rem; border: none; border-radius: 4px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .launcher-btn:hover { opacity: 0.9; }
        .launcher-btn.start { background: #28a745; color: white; }
        .launcher-btn.stop { background: #dc3545; color: white; }
        .launcher-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Node Widgets */
        .nodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
        .node-widget {
            background: var(--bg-card); border-radius: 6px; padding: 0.6rem;
            text-align: center; cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
        }
        .node-widget:hover { border-color: var(--accent); transform: translateY(-2px); }
        .node-widget .icon { font-size: 1.4rem; margin-bottom: 0.25rem; }
        .node-widget .name { font-size: 0.75rem; font-weight: 600; word-break: break-word; }
        .node-widget .category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-top: 0.25rem; }
        .node-widget.category-audio { border-left: 3px solid #fd7e14; }
        .node-widget.category-ai { border-left: 3px solid #0dcaf0; }
        .node-widget.category-skills { border-left: 3px solid #20c997; }
        .node-widget.category-vision { border-left: 3px solid #e83e8c; }
        .node-widget.category-tools { border-left: 3px solid #6c757d; }
        .node-widget.category-other { border-left: 3px solid #adb5bd; }
        
        /* Log Stats */
        .log-stats {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem;
            padding: 0.75rem; background: var(--bg-card);
        }
        .stat-box { text-align: center; padding: 0.5rem; border-radius: 4px; background: var(--bg-panel); }
        .stat-box .count { font-size: 1.25rem; font-weight: bold; }
        .stat-box .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-box.debug { border-left: 3px solid var(--debug); }
        .stat-box.info { border-left: 3px solid var(--info); }
        .stat-box.warn { border-left: 3px solid var(--warn); }
        .stat-box.error { border-left: 3px solid var(--error); }
        .stat-box.fatal { border-left: 3px solid var(--fatal); }
        
        /* Log Viewer */
        .log-controls { display: flex; gap: 0.5rem; padding: 0.5rem; background: var(--bg-card); flex-wrap: wrap; }
        .log-controls select, .log-controls input {
            background: var(--bg-panel); color: var(--text); border: 1px solid var(--bg-card);
            padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.85rem;
        }
        .log-controls input { flex: 1; min-width: 150px; }
        .log-controls button {
            background: var(--accent); color: white; border: none;
            padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
        }
        .log-controls button:hover { opacity: 0.9; }
        
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; font-family: 'Monaco', 'Menlo', monospace; }
        .log-table th { background: var(--bg-card); padding: 0.5rem; text-align: left; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        .log-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--bg-card); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
        .log-table tr:hover { background: var(--bg-card); }
        .log-table .level-debug { color: var(--debug); }
        .log-table .level-info { color: var(--info); }
        .log-table .level-warn { color: var(--warn); }
        .log-table .level-error { color: var(--error); }
        .log-table .level-fatal { color: var(--fatal); font-weight: bold; }
        .log-table .timestamp { color: var(--text-muted); font-size: 0.75rem; }
        .log-table .node-name { color: var(--accent-green); font-size: 0.8rem; }
        
        /* Topics */
        .topic-item {
            background: var(--bg-card); border-radius: 4px; padding: 0.5rem 0.75rem;
            margin-bottom: 0.4rem; cursor: pointer; transition: background 0.2s;
        }
        .topic-item:hover { background: var(--bg-panel); }
        .topic-item .name { font-size: 0.8rem; font-weight: 600; color: var(--accent-green); word-break: break-all; }
        .topic-item .type { font-size: 0.7rem; color: var(--text-muted); }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 2rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-panel); border-radius: 8px; max-width: 600px; width: 100%;
            max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { background: var(--bg-card); padding: 1rem; display: flex;
            justify-content: space-between; align-items: center; }
        .modal-header button { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .modal-content { padding: 1rem; overflow-y: auto; }
        .modal-section { margin-bottom: 1rem; }
        .modal-section h4 { color: var(--accent); margin-bottom: 0.5rem; font-size: 0.9rem; }
        .modal-section ul { list-style: none; font-size: 0.85rem; }
        .modal-section li { padding: 0.25rem 0; border-bottom: 1px solid var(--bg-card); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        .auto-scroll { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-muted); }
        .auto-scroll input { cursor: pointer; }
        
        .tts-row { display: flex; gap: 0.5rem; }
        .tts-row input { flex: 1; background: var(--bg-dark); color: var(--text); border: 1px solid var(--bg-card); padding: 0.5rem 0.75rem; border-radius: 4px; font-size: 0.9rem; }
        .tts-row button { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .tts-row button:hover { opacity: 0.9; }
        .tts-message { font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <h1>AIMEE ROS2 Monitor</h1>
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </header>
    
    <main>
        <!-- Left Panel: Core + Launcher + Active Nodes -->
        <div class="panel" style="display: flex; flex-direction: column; gap: 1rem; background: transparent;">
            <!-- Core Control -->
            <div class="panel" style="flex: 0 0 auto;">
                <div class="panel-header">
                    <span>⚙️ Core System</span>
                    <span id="coreStatusBadge" style="font-size: 0.75rem; padding: 2px 8px; background: var(--error); border-radius: 4px;">STOPPED</span>
                </div>
                <div class="panel-content">
                    <div class="core-controls">
                        <button class="core-btn core-start" onclick="startCore()">
                            <span class="btn-icon">▶</span> Start Core
                        </button>
                        <button class="core-btn core-stop" onclick="stopCore()">
                            <span class="btn-icon">■</span> Stop Core
                        </button>
                    </div>
                    <div id="coreMessage" class="core-message"></div>
                </div>
            </div>
            
            <!-- Node Launcher -->
            <div class="panel" style="flex: 1; min-height: 200px;">
                <div class="panel-header">
                    <span>🚀 Node Launcher</span>
                </div>
                <div class="panel-content" id="nodeLauncher">
                    <div style="color:var(--text-muted);text-align:center;padding:2rem;">Loading...</div>
                </div>
            </div>
            
            <!-- Active Nodes -->
            <div class="panel" style="flex: 1; min-height: 150px;">
                <div class="panel-header">
                    <span>📊 Active Nodes (<span id="nodeCount">0</span>)</span>
                    <button onclick="refreshNodes()" style="background:none;border:none;color:var(--accent);cursor:pointer;">🔄</button>
                </div>
                <div class="panel-content">
                    <div class="nodes-grid" id="nodesGrid">
                        <div style="color:var(--text-muted);text-align:center;padding:2rem;">Loading...</div>
                    </div>
                </div>
            </div>
            
            <!-- TTS Test -->
            <div class="panel" style="flex: 0 0 auto;">
                <div class="panel-header">
                    <span>🔊 TTS Test</span>
                </div>
                <div class="panel-content" style="padding: 0.75rem;">
                    <div class="tts-row">
                        <input type="text" id="ttsInput" placeholder="Type something to say..." onkeydown="if(event.key==='Enter') speakTTS()">
                        <button onclick="speakTTS()">Speak</button>
                    </div>
                    <div id="ttsMessage" class="tts-message"></div>
                </div>
            </div>
        </div>
        
        <!-- Right Panel: Logs + Topics -->
        <div class="panel" style="display: flex; flex-direction: column; gap: 1rem; background: transparent;">
            <!-- Log Viewer -->
            <div class="panel" style="flex: 2;">
                <div class="log-stats">
                    <div class="stat-box debug"><div class="count" id="statDebug">0</div><div class="label">Debug</div></div>
                    <div class="stat-box info"><div class="count" id="statInfo">0</div><div class="label">Info</div></div>
                    <div class="stat-box warn"><div class="count" id="statWarn">0</div><div class="label">Warn</div></div>
                    <div class="stat-box error"><div class="count" id="statError">0</div><div class="label">Error</div></div>
                    <div class="stat-box fatal"><div class="count" id="statFatal">0</div><div class="label">Fatal</div></div>
                </div>
                
                <div class="log-controls">
                    <select id="levelFilter" onchange="loadLogs()">
                        <option value="all">All Levels</option>
                        <option value="debug">Debug</option>
                        <option value="info" selected>Info+</option>
                        <option value="warn">Warn+</option>
                        <option value="error">Error+</option>
                    </select>
                    <select id="nodeFilter" onchange="loadLogs()">
                        <option value="all">All Nodes</option>
                    </select>
                    <input type="text" id="searchFilter" placeholder="Search logs..." oninput="debouncedLoadLogs()">
                    <label class="auto-scroll"><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
                    <button onclick="loadLogs()">Refresh</button>
                    <button onclick="clearLogs()">Clear</button>
                </div>
                
                <div class="panel-content" id="logContainer">
                    <table class="log-table">
                        <thead>
                            <tr><th style="width:140px">Time</th><th style="width:60px">Level</th><th style="width:150px">Node</th><th>Message</th></tr>
                        </thead>
                        <tbody id="logTableBody">
                            <tr><td colspan="4" style="text-align:center;color:var(--text-muted);">Waiting for logs...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Topics List -->
            <div class="panel" style="flex: 1;">
                <div class="panel-header">
                    <span>📡 Topics (<span id="topicCount">0</span>)</span>
                </div>
                <div class="panel-content" id="topicsList">
                    <div style="color:var(--text-muted);text-align:center;padding:2rem;">Loading topics...</div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Node Details Modal -->
    <div class="modal-overlay" id="nodeModal" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modalTitle">Node Details</h3>
                <button onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-content" id="modalContent">Loading...</div>
        </div>
    </div>
    
    <!-- Topic Inspector Modal -->
    <div class="modal-overlay" id="topicModal" onclick="closeTopicModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="topicModalTitle">Topic Inspector</h3>
                <button onclick="closeTopicModal()">&times;</button>
            </div>
            <div class="modal-content" id="topicModalContent">Loading...</div>
        </div>
    </div>
    
    <script>
        const REFRESH_INTERVAL = 2000;
        let autoRefresh = true;
        let knownNodes = new Set();
        let debounceTimer;
        let nodeDefinitions = {};
        let managedNodes = {};
        let rosRunningNodes = {};
        
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            loadNodes();
            loadTopics();
            loadNodeDefinitions();
            loadManagedNodes();
            updateStatus();
            
            setInterval(() => {
                if (autoRefresh) {
                    loadLogs();
                    loadNodes();
                    loadTopics();
                    loadManagedNodes();
                    updateStatus();
                }
            }, REFRESH_INTERVAL);
        });
        
        // ==================== Logs ====================
        async function loadLogs() {
            try {
                const level = document.getElementById('levelFilter').value;
                const node = document.getElementById('nodeFilter').value;
                const search = document.getElementById('searchFilter').value;
                
                const response = await fetch(`/api/logs?level=${level}&node=${node}&search=${search}&limit=200`);
                const data = await response.json();
                
                document.getElementById('statDebug').textContent = data.stats.debug;
                document.getElementById('statInfo').textContent = data.stats.info;
                document.getElementById('statWarn').textContent = data.stats.warn;
                document.getElementById('statError').textContent = data.stats.error;
                document.getElementById('statFatal').textContent = data.stats.fatal;
                
                updateNodeFilter(data.logs);
                renderLogs(data.logs);
            } catch (err) {
                console.error('Failed to load logs:', err);
            }
        }
        
        function debouncedLoadLogs() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(loadLogs, 300);
        }
        
        function renderLogs(logs) {
            const tbody = document.getElementById('logTableBody');
            
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">No logs match filters</td></tr>';
                return;
            }
            
            const html = logs.map(log => {
                const time = new Date(log.timestamp).toLocaleTimeString();
                const levelClass = `level-${log.level}`;
                return `
                    <tr>
                        <td class="timestamp">${time}</td>
                        <td class="${levelClass}">${log.level.toUpperCase()}</td>
                        <td class="node-name" title="${log.node}">${truncate(log.node, 20)}</td>
                        <td title="${escapeHtml(log.msg)}">${escapeHtml(truncate(log.msg, 80))}</td>
                    </tr>
                `;
            }).join('');
            
            tbody.innerHTML = html;
            
            if (document.getElementById('autoScroll').checked) {
                const container = document.getElementById('logContainer');
                container.scrollTop = container.scrollHeight;
            }
        }
        
        function updateNodeFilter(logs) {
            const select = document.getElementById('nodeFilter');
            const currentValue = select.value;
            const nodes = new Set(['all']);
            logs.forEach(log => nodes.add(log.node));
            
            const nodeArray = Array.from(nodes).sort();
            if (nodeArray.length <= select.options.length) return;
            
            select.innerHTML = nodeArray.map(node => 
                `<option value="${node}" ${node === currentValue ? 'selected' : ''}>
                    ${node === 'all' ? 'All Nodes' : truncate(node, 25)}
                </option>`
            ).join('');
        }
        
        async function clearLogs() {
            await fetch('/api/logs/clear', { method: 'POST' });
            loadLogs();
        }
        
        // ==================== Nodes ====================
        async function loadNodes() {
            try {
                const response = await fetch('/api/nodes');
                const data = await response.json();
                
                document.getElementById('nodeCount').textContent = data.count;
                
                data.nodes.forEach(node => {
                    if (!knownNodes.has(node.name)) knownNodes.add(node.name);
                });
                
                renderNodes(data.nodes);
            } catch (err) {
                console.error('Failed to load nodes:', err);
            }
        }
        
        function renderNodes(nodes) {
            const grid = document.getElementById('nodesGrid');
            
            if (nodes.length === 0) {
                grid.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">No nodes running</div>';
                return;
            }
            
            const icons = { audio: '🔊', ai: '🧠', skills: '🦾', vision: '📷', tools: '🛠️', other: '⚙️' };
            
            const html = nodes.map(node => {
                const shortName = node.name.split('/').pop() || node.name;
                return `
                    <div class="node-widget category-${node.category}" onclick="showNodeDetails('${node.name}')">
                        <div class="icon">${icons[node.category] || icons.other}</div>
                        <div class="name" title="${node.name}">${shortName}</div>
                        <div class="category">${node.category}</div>
                    </div>
                `;
            }).join('');
            
            grid.innerHTML = html;
        }
        
        async function refreshNodes() {
            await fetch('/api/nodes/refresh', { method: 'POST' });
            loadNodes();
        }
        
        async function showNodeDetails(nodeName) {
            const modal = document.getElementById('nodeModal');
            document.getElementById('modalTitle').textContent = nodeName;
            document.getElementById('modalContent').innerHTML = 'Loading...';
            modal.classList.add('active');
            
            try {
                const response = await fetch(`/api/nodes/${encodeURIComponent(nodeName.replace(/^\//, ''))}`);
                const data = await response.json();
                
                if (!data.success) {
                    document.getElementById('modalContent').innerHTML = `<p style="color:var(--error);">Error: ${data.error}</p>`;
                    return;
                }
                
                let html = '';
                ['subscriptions', 'publishers', 'services'].forEach(section => {
                    const items = data[section];
                    const icon = section === 'subscriptions' ? '📥' : section === 'publishers' ? '📤' : '🔧';
                    html += '<div class="modal-section">';
                    html += `<h4>${icon} ${section.charAt(0).toUpperCase() + section.slice(1)} (${items.length})</h4>`;
                    if (items.length > 0) {
                        html += '<ul>' + items.map(i => `<li><strong>${i.name}</strong><br><small>${i.type}</small></li>`).join('') + '</ul>';
                    } else {
                        html += '<p style="color:var(--text-muted);">None</p>';
                    }
                    html += '</div>';
                });
                
                document.getElementById('modalContent').innerHTML = html;
            } catch (err) {
                document.getElementById('modalContent').innerHTML = `<p style="color:var(--error);">Error loading details</p>`;
            }
        }
        
        function closeModal(event) {
            if (!event || event.target.id === 'nodeModal') {
                document.getElementById('nodeModal').classList.remove('active');
            }
        }
        
        // ==================== Topic Inspector ====================
        let topicPollInterval = null;
        let currentTopicName = null;
        
        async function showTopicDetails(topicName, topicType) {
            const modal = document.getElementById('topicModal');
            document.getElementById('topicModalTitle').textContent = topicName;
            document.getElementById('topicModalContent').innerHTML = `<p style="color:var(--text-muted);">Starting subscription...</p>`;
            modal.classList.add('active');
            currentTopicName = topicName;
            
            try {
                await fetch(`/api/topics/${encodeURIComponent(topicName.replace(/^\//, ''))}/subscribe`, { method: 'POST' });
            } catch (err) {
                document.getElementById('topicModalContent').innerHTML = `<p style="color:var(--error);">Failed to subscribe: ${err.message}</p>`;
                return;
            }
            
            if (topicPollInterval) clearInterval(topicPollInterval);
            topicPollInterval = setInterval(async () => {
                if (!currentTopicName) return;
                try {
                    const response = await fetch(`/api/topics/${encodeURIComponent(currentTopicName.replace(/^\//, ''))}/latest`);
                    const data = await response.json();
                    if (!data.success) {
                        document.getElementById('topicModalContent').innerHTML = `<p style="color:var(--error);">${data.error}</p>`;
                        return;
                    }
                    const content = document.getElementById('topicModalContent');
                    if (data.waiting) {
                        content.innerHTML = `<p style="color:var(--text-muted);">Waiting for message...</p><pre style="margin-top:0.5rem;color:var(--text-muted);font-size:0.75rem;">${topicType}</pre>`;
                    } else {
                        const time = new Date(data.received_at * 1000).toLocaleTimeString();
                        content.innerHTML = `<div style="margin-bottom:0.5rem;color:var(--text-muted);font-size:0.75rem;">Received at ${time} · ${topicType}</div><pre style="background:var(--bg-dark);padding:0.75rem;border-radius:4px;overflow-x:auto;font-size:0.8rem;">${escapeHtml(JSON.stringify(data.data, null, 2))}</pre>`;
                    }
                } catch (err) {
                    // ignore polling errors
                }
            }, 1000);
        }
        
        function closeTopicModal(event) {
            if (!event || event.target.id === 'topicModal') {
                document.getElementById('topicModal').classList.remove('active');
                if (topicPollInterval) {
                    clearInterval(topicPollInterval);
                    topicPollInterval = null;
                }
                if (currentTopicName) {
                    fetch(`/api/topics/${encodeURIComponent(currentTopicName.replace(/^\//, ''))}/unsubscribe`, { method: 'POST' }).catch(() => {});
                    currentTopicName = null;
                }
            }
        }
        
        // ==================== Topics ====================
        async function loadTopics() {
            try {
                const response = await fetch('/api/topics');
                const data = await response.json();
                
                document.getElementById('topicCount').textContent = data.count;
                
                const list = document.getElementById('topicsList');
                if (data.topics.length === 0) {
                    list.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">No topics found</div>';
                    return;
                }
                
                list.innerHTML = data.topics.map(topic => `
                    <div class="topic-item" onclick="showTopicDetails('${topic.name}', '${topic.type}')" title="Click to inspect">
                        <div class="name">${topic.name}</div>
                        <div class="type">${topic.type}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load topics:', err);
            }
        }
        
        // ==================== System Status ====================
        async function updateStatus() {
            try {
                const response = await fetch('/api/system');
                const data = await response.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.ros2_running) {
                    dot.classList.add('connected');
                    text.textContent = 'ROS2 Connected';
                } else {
                    dot.classList.remove('connected');
                    text.textContent = 'ROS2 Disconnected';
                }
            } catch (err) {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Connection Error';
            }
        }
        
        // ==================== Core System Controls ====================
        async function startCore() {
            const btn = document.querySelector('.core-start');
            const msg = document.getElementById('coreMessage');
            btn.disabled = true;
            msg.textContent = 'Starting core...';
            msg.style.color = 'var(--info)';
            
            try {
                const response = await fetch('/api/core/start', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    msg.textContent = 'Core started!';
                    msg.style.color = '#28a745';
                    updateCoreStatus();
                } else {
                    msg.textContent = data.error || 'Failed to start';
                    msg.style.color = 'var(--error)';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.style.color = 'var(--error)';
            }
            btn.disabled = false;
        }
        
        async function stopCore() {
            const btn = document.querySelector('.core-stop');
            const msg = document.getElementById('coreMessage');
            btn.disabled = true;
            msg.textContent = 'Stopping core...';
            msg.style.color = 'var(--warn)';
            
            try {
                const response = await fetch('/api/core/stop', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    msg.textContent = 'Core stopped!';
                    msg.style.color = 'var(--text-muted)';
                    updateCoreStatus();
                } else {
                    msg.textContent = data.error || 'Failed to stop';
                    msg.style.color = 'var(--error)';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.style.color = 'var(--error)';
            }
            btn.disabled = false;
        }
        
        async function updateCoreStatus() {
            try {
                const response = await fetch('/api/core/status');
                const data = await response.json();
                
                const badge = document.getElementById('coreStatusBadge');
                if (data.running) {
                    badge.textContent = 'RUNNING';
                    badge.style.background = '#28a745';
                } else {
                    badge.textContent = 'STOPPED';
                    badge.style.background = 'var(--error)';
                }
            } catch (err) {
                console.log('Core status check failed:', err);
            }
        }
        
        setInterval(updateCoreStatus, 3000);
        
        // ==================== Node Launcher ====================
        async function loadNodeDefinitions() {
            try {
                const response = await fetch('/api/nodes/definitions');
                const data = await response.json();
                nodeDefinitions = data.nodes || {};
                renderNodeLauncher();
            } catch (err) {
                console.error('Failed to load node definitions:', err);
            }
        }
        
        async function loadManagedNodes() {
            try {
                const response = await fetch('/api/nodes/managed');
                const data = await response.json();
                managedNodes = data.nodes || {};
                rosRunningNodes = data.ros_running || {};
                renderNodeLauncher();
                updateCoreStatus();
            } catch (err) {
                console.error('Failed to load managed nodes:', err);
            }
        }
        
        function renderNodeLauncher() {
            const container = document.getElementById('nodeLauncher');
            
            if (Object.keys(nodeDefinitions).length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">No nodes available</div>';
                return;
            }
            
            let html = '<div class="launcher-grid">';
            
            for (const [nodeId, nodeDef] of Object.entries(nodeDefinitions)) {
                const isManagedRunning = managedNodes[nodeId] && managedNodes[nodeId].status === 'running';
                const isRosRunning = rosRunningNodes[nodeId] === true;
                const isRunning = isManagedRunning || isRosRunning;
                
                const statusClass = isRunning ? 'running' : '';
                const btnClass = isRunning ? 'stop' : 'start';
                const btnText = isRunning ? 'Stop' : 'Start';
                const btnAction = isRunning ? `stopNode('${nodeId}')` : `startNode('${nodeId}')`;
                
                html += `
                    <div class="launcher-item ${statusClass} category-${nodeDef.category}" id="launcher-${nodeId}">
                        <div class="launcher-info">
                            <span class="launcher-icon">${nodeDef.icon}</span>
                            <div>
                                <div class="launcher-name">${nodeDef.name}</div>
                                <div class="launcher-category">${nodeDef.category}</div>
                            </div>
                        </div>
                        <button class="launcher-btn ${btnClass}" onclick="${btnAction}" id="btn-${nodeId}">
                            ${btnText}
                        </button>
                    </div>
                `;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        async function startNode(nodeId) {
            const btn = document.getElementById(`btn-${nodeId}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Starting...';
            }
            
            try {
                const response = await fetch('/api/nodes/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_id: nodeId })
                });
                const data = await response.json();
                
                if (!data.success) {
                    console.error('Start failed:', data.error);
                }
            } catch (err) {
                console.error('Error starting node:', err);
            }
            
            setTimeout(loadManagedNodes, 500);
            setTimeout(loadManagedNodes, 2000);
        }
        
        async function stopNode(nodeId) {
            const btn = document.getElementById(`btn-${nodeId}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Stopping...';
            }
            
            try {
                const response = await fetch('/api/nodes/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_id: nodeId })
                });
                const data = await response.json();
                
                if (!data.success) {
                    console.error('Stop failed:', data.error);
                }
            } catch (err) {
                console.error('Error stopping node:', err);
            }
            
            setTimeout(loadManagedNodes, 500);
            setTimeout(loadManagedNodes, 2000);
            setTimeout(loadNodes, 3000);
        }
        
        // ==================== TTS Test ====================
        async function speakTTS() {
            const input = document.getElementById('ttsInput');
            const msg = document.getElementById('ttsMessage');
            const text = input.value.trim();
            if (!text) {
                msg.textContent = 'Please enter some text';
                msg.style.color = 'var(--warn)';
                return;
            }
            msg.textContent = 'Sending...';
            msg.style.color = 'var(--text-muted)';
            try {
                const response = await fetch('/api/tts/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                if (data.success) {
                    msg.textContent = 'Sent: ' + truncate(text, 40);
                    msg.style.color = '#28a745';
                    input.value = '';
                } else {
                    msg.textContent = data.error || 'Failed';
                    msg.style.color = 'var(--error)';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.style.color = 'var(--error)';
            }
        }
        
        // ==================== Utilities ====================
        function truncate(str, maxLen) {
            if (str.length <= maxLen) return str;
            return str.substring(0, maxLen - 3) + '...';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('topicModal').classList.contains('active')) {
                    closeTopicModal();
                } else {
                    closeModal();
                }
            }
            if (e.key === ' ' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                autoRefresh = !autoRefresh;
            }
        });
    </script>
</body>
</html>
